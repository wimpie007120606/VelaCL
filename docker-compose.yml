services:
  api:
    build:
      context: .
      target: api
    ports: ["8000:8000"]
    environment:
      VELACL_DASHBOARD_ORIGIN: http://localhost:3000
    volumes:
      - ./experiments:/app/experiments:ro
  dashboard:
    build:
      context: .
      target: dashboard
    ports: ["3000:3000"]
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    depends_on: [api]
  prometheus:
    image: prom/prometheus:v2.53.1
    ports: ["9090:9090"]
    volumes:
      - ./infrastructure/prometheus.yml:/etc/prometheus/prometheus.yml:ro

