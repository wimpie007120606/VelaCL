name: CI
on:
  push:
  pull_request:
jobs:
  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: "3.12", cache: pip}
      - run: pip install 'torch>=2.2,<3' --index-url https://download.pytorch.org/whl/cpu
      - run: pip install -e '.[dev]'
      - run: ruff check .
      - run: pytest
  dashboard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: {node-version: 20, cache: npm, cache-dependency-path: apps/dashboard/package-lock.json}
      - run: npm install
        working-directory: apps/dashboard
      - run: npm run build
        working-directory: apps/dashboard
      - name: Verify Pages export serves experiment data
        working-directory: apps/dashboard
        run: |
          GITHUB_PAGES=1 npm run build
          test -f out/experiments.json
          test -f ../../docs/experiments.json
          npx playwright install --with-deps chromium
          node scripts/check-export.mjs out
          node scripts/check-export.mjs ../../docs
